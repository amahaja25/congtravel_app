
{% extends "base_all_members.html" %}

{% block title %}U.S. House Members{% endblock %}

{% block content %}


<div class="row">
    <h2>All members</h2>
    <table id="member-results" class="display">
        <thead>
            <tr>
                <th>Member</th>
                <th>State</th>
            </tr>
        </thead>
        <tbody>
            {% for row in member_results %}
            <tr>
                <td>
                    <a href="{{ BASE_PATH }}/member/{{ row[1] }}.html">
                            {{ row[0] }}
                    </a>
                </td>
                <td>{{ row[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p class="example-query">See all <a href="{{ BASE_PATH }}/all-sponsors.html">sponsors</a> and <a href="{{ BASE_PATH }}/all-destinations.html">destinations.</a></p>

    <script type="text/javascript">
        $(document).ready(function() {
            $('#member-results').DataTable({
                responsive: false,
                paging: true,
                ordering: true,
                searching: true,
                pageLength: 10,
                order: [],
                columnDefs: []
            });
        });
    </script>
</div>
{% endblock %}
