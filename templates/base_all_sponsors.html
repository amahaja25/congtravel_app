<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
<script>
    // ---------------------------
    // US state mapping
    // ---------------------------
    const usStates = {
        "AL": "Alabama","AK": "Alaska","AZ": "Arizona","AR": "Arkansas",
        "CA": "California","CO": "Colorado","CT": "Connecticut","DE": "Delaware",
        "FL": "Florida","GA": "Georgia","HI": "Hawaii","ID": "Idaho",
        "IL": "Illinois","IN": "Indiana","IA": "Iowa","KS": "Kansas",
        "KY": "Kentucky","LA": "Louisiana","ME": "Maine","MD": "Maryland",
        "MA": "Massachusetts","MI": "Michigan","MN": "Minnesota","MS": "Mississippi",
        "MO": "Missouri","MT": "Montana","NE": "Nebraska","NV": "Nevada",
        "NH": "New Hampshire","NJ": "New Jersey","NM": "New Mexico","NY": "New York",
        "NC": "North Carolina","ND": "North Dakota","OH": "Ohio","OK": "Oklahoma",
        "OR": "Oregon","PA": "Pennsylvania","RI": "Rhode Island","SC": "South Carolina",
        "SD": "South Dakota","TN": "Tennessee","TX": "Texas","UT": "Utah",
        "VT": "Vermont","VA": "Virginia","WA": "Washington","WV": "West Virginia",
        "WI": "Wisconsin","WY": "Wyoming"
    };

    function abbrToFull(abbr) {
        return usStates[abbr.toUpperCase()] || "";
    }

    // ---------------------------
    // Global variables
    // ---------------------------
    let searchableItems = [];
    let fuse;

    // ---------------------------
    // Fetch and preprocess data
    // ---------------------------
    async function fetchAllData() {
        try {
            // Fetch all data from the remote datasette API
            let allData = [];
            let nextUrl = 'https://congtrav-05-14-2025-648704443537.us-east1.run.app/congtravel_master/search_data.json?_size=1000';
            
            // Keep fetching until we get all data (handle pagination)
            while (nextUrl) {
                const response = await fetch(nextUrl);
                const data = await response.json();
                
                if (data.rows) {
                    allData.push(...data.rows);
                }
                
                // Check if there's more data to fetch
                nextUrl = data.next_url || null;
                
                // Safety break to avoid infinite loops
                if (allData.length > 10000) break;
            }

            console.log("Total rows fetched:", allData.length);

            searchableItems = [];

            // Process the rows - format: [rowid, name, type, id]
            for (const row of allData) {
                const [rowid, name, type, id] = row;
                
                // Create proper URL based on type and id
                let url;
                if (type === 'sponsor') {
                    url = `/sponsor/${id}.html`;
                } else if (type === 'destination') {
                    url = `/destination/${id}.html`;
                } else if (type === 'member') {
                    url = `/member/${id}.html`;
                }
                
                if (url && name) {
                    const item = {
                        id: id,
                        name: name.toLowerCase(), // For searching
                        displayName: name, // Original name for display
                        type: type,
                        url: url,
                        state_full: "",
                        state_abbr: ""
                    };
                    
                    searchableItems.push(item);
                }
            }

            console.log("Items before deduplication:", searchableItems.length);

            // Deduplicate
            const seen = new Set();
            searchableItems = searchableItems.filter(item => {
                const key = `${item.id}-${item.type}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            console.log("Items after deduplication:", searchableItems.length);

            // Initialize Fuse
            fuse = new Fuse(searchableItems, {
                keys: [
                    { name: 'name', weight: 0.7 },
                    { name: 'state_full', weight: 0.2 },
                    { name: 'state_abbr', weight: 0.1 }
                ],
                threshold: 0.6,
                includeScore: true,
                shouldSort: true,
                ignoreLocation: true,
                minMatchCharLength: 2
            });

            console.log("Fuse initialized.");
            console.log("Test search 'kevin mccarthy':", fuse.search("kevin mccarthy").map(r => r.item));
            console.log("Test search 'baltimore':", fuse.search("baltimore").map(r => r.item));
            console.log("Test search 'MD':", fuse.search("MD").map(r => r.item));

        } catch (error) {
            console.error("Error fetching search data:", error);
        }
    }

    // Fetch the data
    fetchAllData();

    // ---------------------------
    // DOM elements
    // ---------------------------
    const searchInput = document.getElementById('searchInput');
    const resultsDropdown = document.getElementById('resultsDropdown');

    // ---------------------------
    // Display results
    // ---------------------------
    function displayResults(results) {
        if (!results.length) {
            resultsDropdown.innerHTML = '<div class="result-item">No results found</div>';
            resultsDropdown.classList.add('active');
            return;
        }

        resultsDropdown.innerHTML = results
            .map(({ item }) => `
                <a href="{{ BASE_PATH }}${item.url}" class="result-item">
                    <div>${item.displayName}</div>
                    <div class="result-type">${item.type}</div>
                </a>
            `)
            .join('');

        resultsDropdown.classList.add('active');
    }

    // ---------------------------
    // Search input listener
    // ---------------------------
    searchInput.addEventListener('input', e => {
        const term = e.target.value.trim().toLowerCase();
        if (!term || !fuse) {
            resultsDropdown.innerHTML = '';
            resultsDropdown.classList.remove('active');
            return;
        }

        // Fuse search
        const results = fuse.search(term).slice(0, 20);
        displayResults(results);
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
        if (!searchInput.contains(e.target) && !resultsDropdown.contains(e.target)) {
            resultsDropdown.classList.remove('active');
        }
    });

    // Reopen dropdown on focus
    searchInput.addEventListener('focus', () => {
        if (searchInput.value.trim() && fuse) {
            resultsDropdown.classList.add('active');
        }
    });
    </script>
